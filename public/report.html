<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>예진이 — 예진 보고서</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="page">
    <div class="header" style="padding-bottom:8px;">
      <div style="display:flex; align-items:center; gap:8px; justify-content:center;">
        <span style="font-size:20px;">🩺</span>
        <span style="font-weight:700; font-size:18px;">예진 보고서</span>
      </div>
      <p style="margin-top:4px;">의사 선생님께 이 화면을 보여주세요</p>
    </div>

    <div id="loading" class="loading">보고서를 생성하고 있어요...</div>

    <!-- 병원 공유 QR 섹션 -->
    <div id="share-section" class="hidden" style="background:#f8fafc; border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:16px; text-align:center;">
      <h3 style="margin:0 0 10px 0; font-size:16px;">📱 병원에 공유하기</h3>

      <div id="share-consent" style="text-align:left; background:white; padding:12px; border-radius:8px; margin-bottom:12px; font-size:13px;">
        <label style="display:flex; gap:8px; align-items:flex-start; cursor:pointer;">
          <input type="checkbox" id="share-agree" style="margin-top:3px;" />
          <span>
            이 QR을 스캔한 병원이 <strong>72시간 동안</strong> 내 문진 보고서를 열람하는 것에 동의합니다.
            (스캔 후 30분 이내 사용하지 않으면 QR이 만료됩니다.)
          </span>
        </label>
      </div>

      <button id="gen-qr-btn" class="btn btn-primary" style="width:100%;" disabled>QR 코드 생성</button>

      <div id="qr-container" class="hidden" style="margin-top:16px;">
        <div id="qr-canvas" style="display:inline-block; padding:14px; background:white; border:1px solid var(--border); border-radius:12px;"></div>
        <p style="font-size:12px; color:var(--text-muted); margin-top:10px;">
          병원 계정으로 로그인된 기기에서 이 코드를 스캔하면<br/>진료에 필요한 정보를 열람할 수 있습니다.
        </p>
        <p id="qr-url-box" style="font-size:11px; color:var(--text-muted); margin-top:8px; word-break:break-all;"></p>
      </div>
    </div>

    <div id="report-content" class="report-wrap hidden"></div>

    <div class="report-footer">
      이 문서는 AI가 생성한 면담 준비 메모입니다.<br />
      의학적 진단이 아니며 의사의 판단을 대체하지 않습니다.<br />
      알고리즘 버전: 2026.04
    </div>
  </div>

  <script src="/js/report.js"></script>
  <script src="/js/footer.js"></script>
</body>
</html>
