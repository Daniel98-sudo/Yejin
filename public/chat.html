<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>예진이 — 문진</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="page">
    <div class="header" style="padding-bottom:8px;">
      <div style="display:flex; align-items:center; gap:8px; justify-content:center;">
        <span style="font-size:20px;">🩺</span>
        <span style="font-weight:700; font-size:18px;">예진이</span>
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress" style="width:0%"></div>
    </div>
    <div style="font-size:12px; color:var(--text-muted); text-align:right; margin-bottom:8px;">
      <span id="step-label">0 / 7</span>
    </div>

    <div class="chat-wrap">
      <div class="messages" id="messages"></div>
      <div class="input-area" id="input-area"></div>
    </div>
  </div>

  <!-- Red Flag Overlay (hidden) -->
  <div class="redflag-overlay hidden" id="redflag-overlay">
    <div class="flag-icon" id="flag-icon"></div>
    <h2 id="flag-title"></h2>
    <p id="flag-reason"></p>
    <p class="action" id="flag-action"></p>
    <button class="btn" id="flag-continue" style="background:rgba(255,255,255,0.2); color:inherit; max-width:320px;">
      이해했습니다. 보고서 확인하기 →
    </button>
    <a href="tel:119" class="btn btn-emergency hidden" id="flag-119" style="max-width:320px; margin-top:12px;">
      📞 119 전화하기
    </a>
  </div>

  <script src="/js/chat.js"></script>
</body>
</html>
