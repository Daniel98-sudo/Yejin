<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>예진이 — 로그인</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .auth-tabs { display:flex; border-bottom:1px solid var(--border); margin-bottom:20px; }
    .auth-tab { flex:1; padding:12px; background:none; border:none; cursor:pointer; font-size:15px; font-weight:500; color:var(--text-muted); border-bottom:2px solid transparent; transition:all .15s; }
    .auth-tab.active { color:#2563eb; border-bottom-color:#2563eb; }
    .field { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
    .field label { font-size:13px; color:var(--text-muted); }
    .field input { padding:12px; border:1px solid var(--border); border-radius:8px; font-size:15px; }
    .field input:focus { outline:none; border-color:#2563eb; }
    .link-btn { background:none; border:none; color:#2563eb; font-size:13px; cursor:pointer; text-decoration:underline; padding:0; }
    .divider { display:flex; align-items:center; gap:12px; margin:20px 0; color:var(--text-muted); font-size:12px; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .msg { font-size:13px; padding:10px; border-radius:6px; margin-bottom:12px; }
    .msg-err { background:#fef2f2; color:#dc2626; border:1px solid #fecaca; }
    .msg-ok { background:#f0fdf4; color:#16a34a; border:1px solid #bbf7d0; }
    .msg-info { background:#eff6ff; color:#1e40af; border:1px solid #bfdbfe; }
    .consent-box {
      background:#f8fafc; border:1px solid var(--border); border-radius:10px;
      padding:14px; margin:6px 0 14px; display:flex; flex-direction:column; gap:10px;
    }
    .consent-item { display:flex; align-items:flex-start; gap:10px; font-size:13px; line-height:1.5; cursor:pointer; color:var(--text); }
    .consent-item input { margin-top:3px; accent-color: var(--primary); flex-shrink:0; }
    .consent-item .req { color:#dc2626; font-weight:600; }
    .consent-item a { color:var(--primary); text-decoration:underline; }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="logo">🩺</div>
      <h1>예진이</h1>
      <p>병원 가기 전, AI와 미리 문진하세요</p>
    </div>

    <div style="padding:24px 0;">
      <div class="auth-tabs">
        <button class="auth-tab active" data-mode="signin">로그인</button>
        <button class="auth-tab" data-mode="signup">회원가입</button>
      </div>

      <div id="msg-box"></div>

      <div class="field">
        <label for="email">이메일</label>
        <input type="email" id="email" autocomplete="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="password">비밀번호 <span id="pw-hint" class="hidden" style="color:var(--text-muted);">(8자 이상)</span></label>
        <input type="password" id="password" autocomplete="current-password" placeholder="비밀번호" />
      </div>
      <div class="field hidden" id="password2-field">
        <label for="password2">비밀번호 확인</label>
        <input type="password" id="password2" autocomplete="new-password" placeholder="비밀번호 재입력" />
      </div>

      <div id="consent-box" class="consent-box hidden">
        <label class="consent-item">
          <input type="checkbox" id="consent-disclaimer" />
          <span>예진이는 의료기기가 아니며 의학적 진단을 제공하지 않는다는 면책 고지를 읽고 동의합니다. <span class="req">(필수)</span></span>
        </label>
        <label class="consent-item">
          <input type="checkbox" id="consent-research" />
          <span>가명처리된 문진 데이터의 과학적 연구 목적 활용에 동의합니다 (개보법 §28조의2). <a href="/legal.html?doc=privacy" target="_blank">개인정보 처리방침</a> <span class="req">(필수)</span></span>
        </label>
      </div>

      <button id="submit-btn" class="btn btn-primary" style="width:100%; margin-top:4px;">로그인</button>

      <div style="text-align:right; margin-top:10px;">
        <button class="link-btn" id="forgot-btn">비밀번호를 잊으셨나요?</button>
      </div>

      <div class="divider">또는</div>

      <button id="google-login" class="btn btn-ghost" style="width:100%; display:flex;align-items:center;justify-content:center;gap:10px;">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.5 26.8 36 24 36c-5.2 0-9.6-3.3-11.3-8H6.3C9.7 35.7 16.3 40 24 40v4z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.3 4.1-4.2 5.4l6.2 5.2C36.9 40.2 44 35 44 24c0-1.3-.1-2.6-.4-3.9z"/></svg>
        Google로 계속하기
      </button>
    </div>

    <div style="flex:1"></div>

    <!-- 관리자 / 병원 로그인 -->
    <div style="text-align:center; padding-bottom: 16px;">
      <a href="/admin/login.html" style="font-size:12px; color:var(--text-muted); text-decoration:none; border-bottom: 1px dashed var(--border);">
        관리자 · 병원 로그인
      </a>
    </div>

    <div class="report-footer">
      예진이는 의료기기가 아니며 의학적 진단을 제공하지 않습니다.
    </div>
  </div>

  <script src="/js/login.js"></script>
  <script src="/js/footer.js"></script>
</body>
</html>
