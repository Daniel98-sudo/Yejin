<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>예진이 — 문진 시작</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .quota-card { background:#eff6ff; border:1px solid #bfdbfe; border-radius:12px; padding:20px; text-align:center; margin-bottom:16px; }
    .quota-num { font-size:42px; font-weight:800; color:#2563eb; line-height:1; }
    .quota-label { font-size:14px; color:#1e3a5f; margin-top:8px; }
    .quota-detail { font-size:12px; color:#64748b; margin-top:10px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="logo">🩺</div>
      <h1>문진 시작하기</h1>
      <p>OPQRST 기반 예진 · 약 2분 소요</p>
    </div>

    <div id="quota-view" style="padding-top:16px;">
      <div class="quota-card">
        <div id="quota-num" class="quota-num">-</div>
        <div class="quota-label">이번 주 문진 작성 남은 횟수</div>
        <div id="quota-reset" class="quota-detail"></div>
      </div>

      <div class="disclaimer" style="background:#fefce8; border-color:#fef3c7; color:#713f12; font-size:13px;">
        한 계정당 <strong>주 3회</strong>까지 문진표를 작성할 수 있습니다.<br/>
        문진표를 완성하면 1회가 차감되며, <strong>매주 월요일 00:00</strong>에 3회로 리셋됩니다.
      </div>
    </div>

    <div style="flex:1"></div>

    <div style="padding-bottom:16px;">
      <button id="start-btn" class="btn btn-primary" style="width:100%;">문진 시작하기 →</button>
      <button id="logout-btn" class="btn btn-ghost" style="width:100%; margin-top:10px;">로그아웃</button>
    </div>

    <div class="report-footer">
      예진이는 의료기기가 아니며 의학적 진단을 제공하지 않습니다.
    </div>
  </div>

  <script src="/js/consult.js"></script>
</body>
</html>
