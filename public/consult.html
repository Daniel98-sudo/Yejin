<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>예진이 — 문진 시작</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .quota-card { background:#eff6ff; border:1px solid #bfdbfe; border-radius:14px; padding:24px 20px; text-align:center; margin-bottom:16px; }
    .quota-num { font-size:54px; font-weight:800; color:#2563eb; line-height:1; }
    .quota-label { font-size:17px; color:#1e3a5f; margin-top:10px; font-weight:600; }
    .quota-detail { font-size:14px; color:#475569; margin-top:12px; line-height:1.5; }
    .info-box { background:#fefce8; border:1px solid #fef3c7; color:#713f12; border-radius:12px; padding:16px 18px; font-size:15px; line-height:1.6; }
    .info-box strong { color:#b45309; }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="logo">🩺</div>
      <h1>문진 시작하기</h1>
      <p>병원 가기 전 몇 가지 여쭤볼게요 · 2분이면 충분해요</p>
    </div>

    <div id="quota-view" style="padding-top:16px;">
      <div class="quota-card">
        <div id="quota-num" class="quota-num">-</div>
        <div class="quota-label">이번 주에 남은 문진 횟수예요</div>
        <div id="quota-reset" class="quota-detail"></div>
      </div>

      <div class="info-box">
        한 분당 <strong>일주일에 3번</strong>까지 문진을 받으실 수 있어요.<br/>
        문진을 다 마치시면 한 번이 사용되고, <strong>다음 주 월요일 아침</strong>에 다시 3번으로 새로 시작해요.
      </div>
    </div>

    <div style="flex:1"></div>

    <div style="padding-bottom:16px;">
      <button id="start-btn" class="btn btn-primary" style="width:100%; font-size:17px; padding:16px;">문진 시작하기 →</button>
      <a href="/history.html" class="btn btn-ghost" style="display:block; text-align:center; width:100%; margin-top:10px; text-decoration:none;">📋 이전 문진 확인하러 가기</a>
      <a href="/mypage.html" class="btn btn-ghost" style="display:block; text-align:center; width:100%; margin-top:8px; text-decoration:none;">내 계정</a>
      <button id="logout-btn" class="btn btn-ghost" style="width:100%; margin-top:8px;">로그아웃</button>
    </div>

    <div class="report-footer">
      예진이는 의료기기가 아니며 의학적 진단을 제공하지 않습니다.
    </div>
  </div>

  <script src="/js/consult.js"></script>
  <script src="/js/footer.js"></script>
</body>
</html>
