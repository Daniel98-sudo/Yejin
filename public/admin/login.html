<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>예진이 — 관리자 로그인</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="page">
    <div style="flex:1"></div>
    <div class="header">
      <div class="logo">🔐</div>
      <h1>관리자 로그인</h1>
      <p>예진이 관리자 · 병원 전용</p>
    </div>

    <div class="disclaimer" style="background:#fef2f2; border-color:#fecaca; color:#7f1d1d;">
      <strong>⚠️ 접근 제한 구역</strong>
      권한이 있는 관리자 및 등록된 병원 계정만 접근 가능합니다.
      이메일 인증이 완료된 계정만 로그인할 수 있습니다.
    </div>

    <div style="padding: 16px 0; display:flex; flex-direction:column; gap:12px;">
      <input id="email" type="email" placeholder="관리자 이메일"
        style="padding:14px; border:1px solid var(--border); border-radius:var(--radius); font-size:15px; outline:none;" />
      <input id="password" type="password" placeholder="비밀번호"
        style="padding:14px; border:1px solid var(--border); border-radius:var(--radius); font-size:15px; outline:none;" />
      <button id="login-btn" class="btn btn-primary">로그인</button>
      <div id="error-msg" class="hidden"
        style="color:#dc2626; font-size:13px; text-align:center; padding:8px; background:#fef2f2; border-radius:8px;"></div>
      <div id="verify-msg" class="hidden"
        style="color:#b45309; font-size:13px; text-align:center; padding:8px; background:#fefce8; border-radius:8px;">
        이메일 인증이 필요합니다.
        <button id="resend-btn" style="background:none;border:none;color:#2563eb;cursor:pointer;font-size:13px;text-decoration:underline;">
          인증 메일 재발송
        </button>
      </div>
    </div>

    <div style="flex:1"></div>

    <div style="text-align:center; padding:12px 0; border-top:1px solid var(--border); margin-top:8px;">
      <p style="font-size:13px; color:var(--text-muted); margin-bottom:8px;">등록된 병원 계정이 없으신가요?</p>
      <a href="/hospital/signup.html" class="btn btn-ghost" style="display:inline-block; font-size:14px; padding:10px 20px;">
        🏥 병원 회원가입
      </a>
    </div>

    <div style="text-align:center; padding-bottom:24px;">
      <a href="/" style="font-size:12px; color:var(--text-muted); text-decoration:none;">← 환자 메인으로</a>
    </div>
  </div>
  <script src="/js/admin/login.js"></script>
  <script src="/js/footer.js"></script>
</body>
</html>
