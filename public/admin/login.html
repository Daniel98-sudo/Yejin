<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>예진이 — 관리자 로그인</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="page">
    <div style="flex:1"></div>
    <div class="header">
      <div class="logo">🔐</div>
      <h1>관리자 로그인</h1>
      <p>예진이 관리자 · 병원 전용</p>
    </div>

    <div class="disclaimer" style="background:#fef2f2; border-color:#fecaca; color:#7f1d1d;">
      <strong>⚠️ 접근 제한 구역</strong>
      권한이 있는 관리자 및 등록된 병원 계정만 접근할 수 있습니다.
      무단 접근 시도는 기록됩니다.
    </div>

    <div style="padding: 24px 0; display:flex; flex-direction:column; gap:12px;">
      <button id="google-login" class="btn btn-primary" style="display:flex;align-items:center;justify-content:center;gap:10px;">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.5 26.8 36 24 36c-5.2 0-9.6-3.3-11.3-8H6.3C9.7 35.7 16.3 40 24 40v4z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.3 4.1-4.2 5.4l6.2 5.2C36.9 40.2 44 35 44 24c0-1.3-.1-2.6-.4-3.9z"/></svg>
        Google 계정으로 로그인
      </button>
      <div id="error-msg" class="hidden" style="color:#dc2626; font-size:13px; text-align:center; padding:8px;"></div>
    </div>

    <div style="flex:1"></div>
    <div style="text-align:center; padding-bottom:24px;">
      <a href="/" style="font-size:12px; color:var(--text-muted); text-decoration:none;">← 환자 메인으로</a>
    </div>
  </div>
  <script src="/js/admin-login.js"></script>
</body>
</html>
